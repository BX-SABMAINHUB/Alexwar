<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alexWAR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #dashboard, #game-container {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #e94560;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        input, select, button {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        input, select {
            background: #0f3460;
            color: white;
        }
        button {
            background: #e94560;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #ff5722; }
        .hidden { display: none !important; }
        #game-container { max-width: 800px; height: 600px; }
        canvas { background: #4caf50; border-radius: 5px; width: 100%; height: 80%; }
        #status { margin-top: 15px; font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>alexWAR</h1>
        <input type="text" id="playerName" placeholder="Introduce tu nombre de Comandante" required>
        <select id="playerFlag">
            <option value="es">🇪🇸 España</option>
            <option value="mx">🇲🇽 México</option>
            <option value="ar">🇦🇷 Argentina</option>
            <option value="co">🇨🇴 Colombia</option>
            <option value="un">🇺🇳 Naciones Unidas</option>
        </select>
        
        <button id="btnCreateRoom">Crear Sala</button>
        <input type="text" id="roomIdInput" placeholder="Código de la sala para unirse">
        <button id="btnJoinRoom" style="background: #0f3460;">Unirse a Sala</button>
        <hr style="border-color: #0f3460; margin: 20px 0;">
        <button id="btnSolo" style="background: #4caf50;">Jugar Solo (Bots)</button>

        <div id="status">Esperando acción...</div>
    </div>

    <div id="game-container" class="hidden">
        <h2 id="gameTitle">alexWAR - Campo de Batalla</h2>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span id="playerInfo">Jugador: ---</span>
            <span id="roomInfo">Sala: ---</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <p>El juego está en desarrollo. ¡Próximamente: Tropas, Naves y Misiles!</p>
    </div>

    <script type="module">
        // Importamos Firebase directamente desde el CDN para evitar errores en archivos HTML puros
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
            authDomain: "kahoot-8529e.firebaseapp.com",
            databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
            projectId: "kahoot-8529e",
            storageBucket: "kahoot-8529e.firebasestorage.app",
            messagingSenderId: "313414356056",
            appId: "1:313414356056:web:4aab4587f7df9393008e2d",
            measurementId: "G-8T4CPC1BQ3"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Elementos del DOM
        const dashboard = document.getElementById('dashboard');
        const gameContainer = document.getElementById('game-container');
        const statusDiv = document.getElementById('status');
        const playerNameInput = document.getElementById('playerName');
        const playerFlagSelect = document.getElementById('playerFlag');

        // Función para cambiar a la pantalla de juego
        function startGame(mode, roomId = null) {
            const playerName = playerNameInput.value.trim() || "Comandante Desconocido";
            const flag = playerFlagSelect.options[playerFlagSelect.selectedIndex].text;
            
            dashboard.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            
            document.getElementById('playerInfo').innerText = `Jugador: ${playerName} ${flag}`;
            document.getElementById('roomInfo').innerText = mode === 'solo' ? 'Modo: Solo vs Bots' : `Sala: ${roomId}`;
            
            // Aquí iría el bucle de actualización del canvas para el RTS (RequestAnimationFrame)
            iniciarMotorGrafico();
        }

        // Crear Sala
        document.getElementById('btnCreateRoom').addEventListener('click', async () => {
            if (!playerNameInput.value) return alert("¡Ingresa un nombre primero!");
            statusDiv.innerText = "Creando sala...";
            
            // Generar código de sala aleatorio
            const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const roomRef = ref(db, 'rooms/' + roomId);
            
            try {
                await set(roomRef, {
                    host: playerNameInput.value,
                    status: "waiting",
                    players: {
                        [playerNameInput.value]: { flag: playerFlagSelect.value, ready: true }
                    }
                });
                startGame('multi', roomId);
            } catch (error) {
                statusDiv.innerText = "Error de conexión. Revisa Firebase.";
                console.error("Error al crear sala:", error);
            }
        });

        // Unirse a Sala
        document.getElementById('btnJoinRoom').addEventListener('click', async () => {
            const roomId = document.getElementById('roomIdInput').value.toUpperCase();
            if (!playerNameInput.value) return alert("¡Ingresa un nombre primero!");
            if (!roomId) return alert("Ingresa un código de sala.");
            
            statusDiv.innerText = "Buscando sala...";
            const dbRef = ref(db);
            
            try {
                const snapshot = await get(child(dbRef, `rooms/${roomId}`));
                if (snapshot.exists()) {
                    // Aquí actualizarías Firebase para añadirte como jugador
                    startGame('multi', roomId);
                } else {
                    statusDiv.innerText = "La sala no existe.";
                }
            } catch (error) {
                statusDiv.innerText = "Error de conexión.";
            }
        });

        // Jugar Solo (Bots)
        document.getElementById('btnSolo').addEventListener('click', () => {
            if (!playerNameInput.value) return alert("¡Ingresa un nombre primero!");
            startGame('solo');
        });

        // Simulación del motor gráfico (Esqueleto)
        function iniciarMotorGrafico() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // Lógica de dibujado inicial (aquí programaremos los mapas y los países en el futuro)
            ctx.fillStyle = "#2c3e50";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Mapa cargando... Aquí irán los países.", 20, 50);
        }
    </script>
</body>
</html>
