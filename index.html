<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alexWAR</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a1f;
            color: #0ff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            image-rendering: pixelated;
        }
        #container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        header {
            background: #000;
            padding: 12px;
            text-align: center;
            border-bottom: 6px solid #0ff;
            font-size: 32px;
            text-shadow: 0 0 15px #0ff;
            letter-spacing: 4px;
        }
        button {
            background: #000;
            color: #0ff;
            border: 5px solid #0ff;
            padding: 14px 28px;
            font-family: 'Press Start 2P', cursive;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px #0ff;
            margin: 8px;
        }
        button:hover { background: #0ff; color: #000; transform: scale(1.08); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        input, select {
            background: #111;
            color: #0ff;
            border: 4px solid #0ff;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            width: 320px;
            text-align: center;
            font-size: 16px;
        }
        #mainMenu, #lobbyScreen, #gameScreen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }
        #mapContainer {
            position: relative;
            width: 920px;
            height: 560px;
            background: linear-gradient(#001122, #003355);
            border: 10px solid #0ff;
            box-shadow: 0 0 40px #0ff;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .territory {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            transition: all 0.25s;
            box-shadow: 0 0 20px rgba(0,255,255,0.7);
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }
        .territory:hover { transform: scale(1.12); z-index: 100; }
        .territory .flag { font-size: 22px; margin-bottom: 2px; }
        
        #sidePanel {
            position: absolute;
            right: 25px;
            top: 25px;
            width: 340px;
            background: rgba(10,10,30,0.97);
            border: 6px solid #0ff;
            padding: 18px;
            color: #0ff;
            font-size: 14px;
            box-shadow: 0 0 30px #0ff;
            line-height: 1.4;
        }
        .resourceBar {
            display: flex;
            justify-content: space-around;
            background: #000;
            padding: 12px;
            margin-bottom: 15px;
            border: 4px solid #0ff;
            font-size: 15px;
        }
        .log {
            height: 138px;
            overflow-y: auto;
            background: #000;
            border: 3px solid #0ff;
            padding: 10px;
            font-size: 12px;
            margin-top: 12px;
        }
        .green { color: #0f0; }
        .red { color: #f66; }
        .blue { color: #0ff; }
        
        .flag-select { font-size: 28px; width: auto; }
    </style>
</head>
<body>
    <div id="container">
        <!-- MAIN MENU -->
        <div id="mainMenu">
            <h1 style="font-size:52px;margin:0;color:#0ff;text-shadow:0 0 25px #0ff;">alexWAR</h1>
            <p style="color:#0ff;margin:10px 0 40px 0;font-size:18px;">WORLD CONQUEST • REAL-TIME • 72% TO WIN</p>
            
            <button onclick="startSolo()">PLAY SOLO (with BOTS)</button>
            <button onclick="showCreateRoom()">CREATE PRIVATE ROOM</button>
            <button onclick="showJoinRoom()">JOIN PRIVATE ROOM</button>
            
            <div style="margin-top:50px;font-size:13px;color:#555;">Single HTML • Firebase Realtime • 0 Errors</div>
        </div>

        <!-- CREATE ROOM -->
        <div id="createScreen" style="display:none;">
            <h2>CREATE PRIVATE ROOM</h2>
            <input id="createName" type="text" value="Alex" placeholder="YOUR NAME">
            <select id="createFlag" class="flag-select">
                <option value="🇪🇸">🇪🇸</option>
                <option value="🇫🇷">🇫🇷</option>
                <option value="🇩🇪" selected>🇩🇪</option>
                <option value="🇮🇹">🇮🇹</option>
                <option value="🇬🇧">🇬🇧</option>
                <option value="🇷🇺">🇷🇺</option>
                <option value="🇹🇷">🇹🇷</option>
                <option value="🇵🇱">🇵🇱</option>
                <option value="🇸🇪">🇸🇪</option>
                <option value="🇪🇬">🇪🇬</option>
            </select>
            <button onclick="createRoom()">GENERATE ROOM CODE</button>
            <div id="createdCode" style="font-size:42px;letter-spacing:12px;margin:25px 0;color:#0ff;display:none;"></div>
            <button id="startBtnCreate" onclick="hostStartGame()" style="display:none;">START GAME FOR EVERYONE</button>
            <button onclick="backToMenu()" style="margin-top:20px;">BACK</button>
            <div id="createPlayersList" style="margin-top:30px;width:420px;text-align:left;font-size:14px;"></div>
        </div>

        <!-- JOIN ROOM -->
        <div id="joinScreen" style="display:none;">
            <h2>JOIN PRIVATE ROOM</h2>
            <input id="joinName" type="text" value="Player2" placeholder="YOUR NAME">
            <select id="joinFlag" class="flag-select">
                <option value="🇪🇸">🇪🇸</option>
                <option value="🇫🇷">🇫🇷</option>
                <option value="🇩🇪">🇩🇪</option>
                <option value="🇮🇹" selected>🇮🇹</option>
                <option value="🇬🇧">🇬🇧</option>
                <option value="🇷🇺">🇷🇺</option>
                <option value="🇹🇷">🇹🇷</option>
                <option value="🇵🇱">🇵🇱</option>
                <option value="🇸🇪">🇸🇪</option>
                <option value="🇪🇬">🇪🇬</option>
            </select>
            <input id="joinCode" type="text" placeholder="ROOM CODE (6 letters)" maxlength="6" style="text-transform:uppercase;">
            <button onclick="joinRoom()">JOIN ROOM</button>
            <button onclick="backToMenu()" style="margin-top:20px;">BACK</button>
            <div id="joinPlayersList" style="margin-top:30px;width:420px;text-align:left;font-size:14px;"></div>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" style="display:none;flex-direction:row;position:relative;">
            <div id="mapContainer"></div>
            
            <div id="sidePanel">
                <div style="text-align:center;margin-bottom:15px;">
                    <span id="playerFlag" style="font-size:32px;"></span>
                    <span id="playerNameDisplay" style="font-size:18px;"></span>
                </div>
                
                <div id="resourceBar" class="resourceBar">
                    <div>💰 <span id="gold">1200</span></div>
                    <div>⚔️ <span id="troops">450</span></div>
                    <div>👥 <span id="pop">180</span></div>
                </div>
                
                <div>CONTROL: <b id="controlPercent">0</b>% <span style="font-size:11px;">(72% TO WIN)</span></div>
                
                <div id="selectedInfo" style="margin-top:15px;">
                    <h3 id="selectedName" style="margin:8px 0;color:#0ff;">CLICK A TERRITORY</h3>
                    <div id="ownerInfo"></div>
                    <div id="buildingsList" style="font-size:13px;"></div>
                </div>
                
                <div style="margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    <button onclick="upgradeSelected('cities')" id="btnCity">CITY +</button>
                    <button onclick="upgradeSelected('factories')" id="btnFactory">FACTORY +</button>
                    <button onclick="upgradeSelected('towers')" id="btnTower">TOWER +</button>
                    <button onclick="upgradeSelected('protectors')" id="btnProtector">PROTECTOR +</button>
                    <button onclick="upgradeSelected('ships')" id="btnShip">SHIP +</button>
                </div>
                
                <button onclick="launchMissile()" id="btnMissile" style="width:100%;margin-top:12px;background:#f33;color:#fff;">LAUNCH MISSILE (300💰)</button>
                
                <div id="donateSection" style="margin-top:15px;display:none;">
                    <input id="donateGold" type="number" value="200" placeholder="Gold">
                    <button onclick="donate('gold')" style="width:100%;margin:4px 0;">DONATE GOLD</button>
                    <input id="donateTroops" type="number" value="100" placeholder="Troops">
                    <button onclick="donate('troops')" style="width:100%;margin:4px 0;">DONATE TROOPS</button>
                </div>
                
                <div id="attackSection" style="margin-top:15px;display:none;">
                    <input id="troopsToSend" type="number" value="200" style="width:100%;">
                    <button onclick="sendAttack()" style="width:100%;">ATTACK WITH TROOPS</button>
                </div>
                
                <div class="log" id="gameLog"></div>
            </div>
            
            <div style="position:absolute;bottom:20px;left:20px;">
                <button onclick="endGame()" style="padding:10px 22px;font-size:15px;">END GAME</button>
            </div>
        </div>
    </div>

<script>
// ====================== FIREBASE ======================
const firebaseConfig = {
    apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
    authDomain: "kahoot-8529e.firebaseapp.com",
    databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
    projectId: "kahoot-8529e",
    storageBucket: "kahoot-8529e.firebasestorage.app",
    messagingSenderId: "313414356056",
    appId: "1:313414356056:web:4aab4587f7df9393008e2d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ====================== VARIABLES ======================
let mode = "solo";
let roomId = null;
let myName = "";
let myFlag = "🇩🇪";
let myResources = { gold: 1250, troops: 520, pop: 0 };
let territories = [];
let selectedId = null;
let gameInterval = null;
let logMessages = [];
let isHost = false;
let firebaseListener = null;

// ====================== TERRITORIES - MAPA CURADO ESTILO FRONTWARS ======================
const initialTerritories = [
    {id:"ES", name:"🇪🇸 Spain", x:85, y:310, w:118, h:78, owner:"neutral", coastal:true, area:9200,
     buildings:{cities:{level:3},factories:{level:2},towers:{level:1},protectors:{level:0},ships:{level:1}}},
    {id:"FR", name:"🇫🇷 France", x:225, y:235, w:132, h:92, owner:"neutral", coastal:true, area:10500,
     buildings:{cities:{level:4},factories:{level:3},towers:{level:2},protectors:{level:1},ships:{level:2}}},
    {id:"DE", name:"🇩🇪 Germany", x:365, y:168, w:125, h:88, owner:"neutral", coastal:true, area:9800,
     buildings:{cities:{level:5},factories:{level:4},towers:{level:3},protectors:{level:2},ships:{level:1}}},
    {id:"IT", name:"🇮🇹 Italy", x:355, y:365, w:108, h:115, owner:"neutral", coastal:true, area:8200,
     buildings:{cities:{level:3},factories:{level:2},towers:{level:1},protectors:{level:1},ships:{level:3}}},
    {id:"UK", name:"🇬🇧 UK", x:128, y:105, w:112, h:72, owner:"neutral", coastal:true, area:7600,
     buildings:{cities:{level:4},factories:{level:3},towers:{level:2},protectors:{level:2},ships:{level:4}}},
    {id:"GR", name:"🇬🇷 Greece", x:545, y:385, w:98, h:68, owner:"neutral", coastal:true, area:4800,
     buildings:{cities:{level:2},factories:{level:1},towers:{level:1},protectors:{level:0},ships:{level:2}}},
    {id:"RU", name:"🇷🇺 Russia", x:620, y:90, w:210, h:165, owner:"neutral", coastal:true, area:18500,
     buildings:{cities:{level:6},factories:{level:5},towers:{level:4},protectors:{level:3},ships:{level:2}}},
    {id:"TR", name:"🇹🇷 Turkey", x:580, y:320, w:115, h:75, owner:"neutral", coastal:true, area:6500,
     buildings:{cities:{level:3},factories:{level:2},towers:{level:2},protectors:{level:1},ships:{level:1}}},
    {id:"PL", name:"🇵🇱 Poland", x:445, y:165, w:98, h:72, owner:"neutral", coastal:false, area:5200,
     buildings:{cities:{level:2},factories:{level:3},towers:{level:2},protectors:{level:1},ships:{level:0}}},
    {id:"SE", name:"🇸🇪 Sweden", x:380, y:40, w:95, h:110, owner:"neutral", coastal:true, area:6800,
     buildings:{cities:{level:2},factories:{level:2},towers:{level:1},protectors:{level:0},ships:{level:3}}},
    {id:"EG", name:"🇪🇬 Egypt", x:520, y:460, w:105, h:68, owner:"neutral", coastal:true, area:4900,
     buildings:{cities:{level:2},factories:{level:1},towers:{level:1},protectors:{level:1},ships:{level:2}}}
];

// ====================== HELPER ======================
function getOwnerColor(owner) {
    if (mode === "solo") return owner === "player" ? "#0f0" : (owner.startsWith("bot") ? "#f33" : "#555");
    return owner === myName ? "#0ff" : (owner === "neutral" ? "#555" : "#fa0");
}

function totalArea() {
    return territories.reduce((sum, t) => sum + t.area, 0);
}

function calculateControl() {
    let myArea = 0;
    territories.forEach(t => {
        if ((mode==="solo" && t.owner==="player") || (mode==="multi" && t.owner===myName)) myArea += t.area;
    });
    return Math.round((myArea / totalArea()) * 100);
}

function renderMap() {
    const cont = document.getElementById("mapContainer");
    cont.innerHTML = "";
    territories.forEach(t => {
        const div = document.createElement("div");
        div.className = "territory";
        div.style.left = t.x + "px";
        div.style.top = t.y + "px";
        div.style.width = t.w + "px";
        div.style.height = t.h + "px";
        div.style.backgroundColor = getOwnerColor(t.owner);
        div.style.border = `5px solid ${t.owner === (mode==="solo"?"player":myName) ? "#0ff" : "#222"}`;
        
        div.innerHTML = `
            <div class="flag">${t.name.split(" ")[0]}</div>
            <div style="font-size:10px;line-height:1;">${t.name.split(" ")[1]||""}</div>
            <div style="font-size:9px;margin-top:3px;">C${t.buildings.cities.level} F${t.buildings.factories.level} T${t.buildings.towers.level}</div>
        `;
        div.onclick = () => selectTerritory(t.id);
        cont.appendChild(div);
    });
}

function updateResources() {
    document.getElementById("gold").textContent = Math.floor(myResources.gold);
    document.getElementById("troops").textContent = Math.floor(myResources.troops);
    document.getElementById("pop").textContent = Math.floor(myResources.pop);
    document.getElementById("controlPercent").textContent = calculateControl();
}

function addLog(txt, col = "green") {
    logMessages.unshift(`<span class="${col}">[${new Date().toLocaleTimeString().slice(0,8)}] ${txt}</span>`);
    if (logMessages.length > 10) logMessages.pop();
    document.getElementById("gameLog").innerHTML = logMessages.join("<br>");
}

function selectTerritory(id) {
    selectedId = id;
    const t = territories.find(x => x.id === id);
    if (!t) return;
    
    document.getElementById("selectedName").innerHTML = t.name;
    const isMine = (mode==="solo" && t.owner==="player") || (mode==="multi" && t.owner===myName);
    
    document.getElementById("ownerInfo").innerHTML = `OWNER: <b>${isMine ? "YOU" : t.owner}</b>`;
    
    let bld = `<b>BUILDINGS (max 200):</b><br>`;
    Object.keys(t.buildings).forEach(k => {
        bld += `${k.toUpperCase()}: lvl ${t.buildings[k].level}<br>`;
    });
    document.getElementById("buildingsList").innerHTML = bld;
    
    // Botones
    const btns = ["btnCity","btnFactory","btnTower","btnProtector","btnShip","btnMissile"];
    btns.forEach(b => document.getElementById(b).disabled = !isMine);
    
    document.getElementById("attackSection").style.display = isMine ? "none" : "block";
    document.getElementById("donateSection").style.display = (mode==="multi" && !isMine && t.owner !== "neutral") ? "block" : "none";
}

// ====================== UPGRADE ======================
function upgradeSelected(type) {
    if (!selectedId) return;
    const t = territories.find(x => x.id === selectedId);
    if (!t) return;
    const isMine = (mode==="solo" && t.owner==="player") || (mode==="multi" && t.owner===myName);
    if (!isMine) return;
    
    const cost = Math.floor(75 * (t.buildings[type].level + 2));
    if (myResources.gold < cost) { addLog("NOT ENOUGH GOLD!", "red"); return; }
    
    myResources.gold -= cost;
    t.buildings[type].level = Math.min(200, t.buildings[type].level + 1);
    
    addLog(`UPGRADED ${type.toUpperCase()} → lvl ${t.buildings[type].level} (-${cost}💰)`, "green");
    renderMap();
    selectTerritory(selectedId);
    updateResources();
    if (mode === "multi" && roomId) saveGameState();
}

// ====================== ATTACK ======================
function sendAttack() {
    if (!selectedId) return;
    const target = territories.find(x => x.id === selectedId);
    if (!target || (mode==="solo" && target.owner==="player") || (mode==="multi" && target.owner===myName)) return;
    
    let sent = parseInt(document.getElementById("troopsToSend").value) || 150;
    if (sent > myResources.troops || sent < 20) return;
    myResources.troops -= sent;
    
    // Defensa + barcos
    let defense = 90 + target.buildings.towers.level * 32 + target.buildings.cities.level * 12;
    if (target.coastal && target.buildings.ships.level > 0) defense += target.buildings.ships.level * 22; // barcos interceptan
    
    const attackerPower = sent * 1.1 + (target.coastal && territories.find(x=>x.id===selectedId && x.buildings.ships.level>0) ? 120 : 0);
    
    const winChance = attackerPower / (attackerPower + defense);
    const win = Math.random() < (winChance * 0.95);
    
    if (win) {
        addLog(`VICTORY! Conquered ${target.name}`, "green");
        target.owner = mode === "solo" ? "player" : myName;
        myResources.troops += Math.floor(sent * 0.45);
    } else {
        addLog(`DEFEAT on ${target.name}`, "red");
        myResources.troops = Math.max(0, myResources.troops - Math.floor(sent * 0.65));
    }
    
    renderMap();
    updateResources();
    if (mode === "multi" && roomId) saveGameState();
    checkWin();
}

// ====================== MISSILE ======================
function launchMissile() {
    if (!selectedId) return;
    const target = territories.find(x => x.id === selectedId);
    if (!target || (mode==="solo" && target.owner==="player") || (mode==="multi" && target.owner===myName)) return;
    
    if (myResources.gold < 300) { addLog("300 GOLD NEEDED", "red"); return; }
    myResources.gold -= 300;
    
    const block = target.buildings.protectors.level / 210;
    if (Math.random() < block) {
        addLog(`MISSILE BLOCKED by PROTECTOR!`, "red");
    } else {
        const dmg = Math.random();
        if (dmg < 0.35) target.buildings.cities.level = Math.max(0, target.buildings.cities.level - 3);
        else if (dmg < 0.7) target.buildings.factories.level = Math.max(0, target.buildings.factories.level - 3);
        else target.buildings.towers.level = Math.max(0, target.buildings.towers.level - 4);
        addLog(`MISSILE HIT ${target.name}!`, "red");
    }
    renderMap();
    selectTerritory(selectedId);
    updateResources();
    if (mode === "multi" && roomId) saveGameState();
}

// ====================== DONATE ======================
function donate(type) {
    if (!selectedId) return;
    const target = territories.find(x => x.id === selectedId);
    if (!target || mode !== "multi" || target.owner === myName || target.owner === "neutral") return;
    
    let amount = parseInt(document.getElementById(type === "gold" ? "donateGold" : "donateTroops").value) || 100;
    if (type === "gold" && amount > myResources.gold) amount = myResources.gold;
    if (type === "troops" && amount > myResources.troops) amount = myResources.troops;
    if (amount <= 0) return;
    
    if (type === "gold") myResources.gold -= amount;
    else myResources.troops -= amount;
    
    // En multi, el dueño recibe (simulado en save)
    addLog(`DONATED ${amount} ${type} to ${target.owner}`, "blue");
    updateResources();
    if (roomId) saveGameState();
}

// ====================== GAME TICK ======================
function gameTick() {
    let totalCities = 0, totalFactories = 0;
    territories.forEach(t => {
        if ((mode==="solo" && t.owner==="player") || (mode==="multi" && t.owner===myName)) {
            totalCities += t.buildings.cities.level;
            totalFactories += t.buildings.factories.level;
        }
    });
    
    myResources.pop = Math.floor(totalCities * 48);
    myResources.gold += Math.floor(totalFactories * 8.5) + 4;
    myResources.troops += Math.floor(totalCities * 2.1);
    
    updateResources();
    renderMap();
    checkWin();
    
    // BOTS SOLO
    if (mode === "solo") {
        territories.forEach(t => {
            if (t.owner.startsWith("bot") && Math.random() < 0.28) {
                const myTerr = territories.filter(x => x.owner === "player");
                if (myTerr.length && Math.random() < 0.65) {
                    const tgt = myTerr[Math.floor(Math.random()*myTerr.length)];
                    const sent = 90 + Math.random()*140;
                    const def = 70 + tgt.buildings.towers.level * 30;
                    if (sent * 0.85 > def) {
                        tgt.owner = t.owner;
                        addLog(`BOT ${t.owner} conquered ${tgt.name}!`, "red");
                    }
                }
            }
        });
    }
}

function checkWin() {
    const perc = calculateControl();
    if (perc >= 72) {
        clearInterval(gameInterval);
        setTimeout(() => {
            alert("🎉 YOU WIN! You control " + perc + "% of the world!");
            endGame();
        }, 300);
    }
}

// ====================== FIREBASE SAVE / LOAD ======================
function saveGameState() {
    if (!roomId) return;
    db.ref("rooms/" + roomId).update({
        territories: territories,
        players: {
            [myName]: { gold: myResources.gold, troops: myResources.troops, flag: myFlag }
        },
        gameStarted: true,
        lastUpdate: Date.now()
    });
}

function loadGameState(snapshot) {
    const data = snapshot.val();
    if (!data) return;
    
    if (data.territories) territories = data.territories;
    if (data.players && data.players[myName]) {
        myResources.gold = data.players[myName].gold || myResources.gold;
        myResources.troops = data.players[myName].troops || myResources.troops;
    }
    if (data.gameStarted && document.getElementById("lobbyScreen").style.display !== "none") {
        enterGame();
    }
    renderMap();
    updateResources();
}

// ====================== LOBBY ======================
function createRoom() {
    myName = document.getElementById("createName").value.trim() || "Alex";
    myFlag = document.getElementById("createFlag").value;
    isHost = true;
    
    roomId = Math.random().toString(36).substring(2,8).toUpperCase();
    document.getElementById("createdCode").textContent = roomId;
    document.getElementById("createdCode").style.display = "block";
    document.getElementById("startBtnCreate").style.display = "inline-block";
    
    territories = JSON.parse(JSON.stringify(initialTerritories));
    territories[0].owner = myName; // Spain yours
    
    const initialData = {
        players: {},
        territories: territories,
        gameStarted: false
    };
    initialData.players[myName] = { gold: myResources.gold, troops: myResources.troops, flag: myFlag };
    
    db.ref("rooms/" + roomId).set(initialData);
    
    firebaseListener = db.ref("rooms/" + roomId).on("value", loadGameState);
    renderLobbyPlayers();
}

function joinRoom() {
    myName = document.getElementById("joinName").value.trim() || "Player" + Math.floor(Math.random()*999);
    myFlag = document.getElementById("joinFlag").value;
    const code = document.getElementById("joinCode").value.trim().toUpperCase();
    if (code.length !== 6) { alert("Code must be 6 characters"); return; }
    
    roomId = code;
    isHost = false;
    
    db.ref("rooms/" + roomId).transaction(data => {
        if (data) {
            if (!data.players[myName]) {
                data.players[myName] = { gold: 850, troops: 320, flag: myFlag };
                // Give one neutral territory
                for (let t of data.territories) {
                    if (t.owner === "neutral") { t.owner = myName; break; }
                }
            }
            return data;
        }
    });
    
    firebaseListener = db.ref("rooms/" + roomId).on("value", loadGameState);
    renderLobbyPlayers();
}

function renderLobbyPlayers() {
    const listId = isHost ? "createPlayersList" : "joinPlayersList";
    db.ref("rooms/" + roomId + "/players").on("value", snap => {
        let html = "<b>PLAYERS IN ROOM:</b><br>";
        const players = snap.val() || {};
        Object.keys(players).forEach(p => {
            html += `• ${players[p].flag} ${p} ${p===myName?"(YOU)":""}<br>`;
        });
        document.getElementById(listId).innerHTML = html;
    });
}

function hostStartGame() {
    if (!isHost) return;
    db.ref("rooms/" + roomId).update({ gameStarted: true });
}

function enterGame() {
    mode = "multi";
    document.getElementById("createScreen").style.display = "none";
    document.getElementById("joinScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
    
    document.getElementById("playerFlag").textContent = myFlag;
    document.getElementById("playerNameDisplay").textContent = myName;
    
    addLog("PRIVATE ROOM STARTED - GOOD LUCK COMMANDER!", "green");
    renderMap();
    updateResources();
    
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameTick, 950);
}

// ====================== SOLO ======================
function startSolo() {
    mode = "solo";
    myName = "player";
    territories = JSON.parse(JSON.stringify(initialTerritories));
    territories[0].owner = "player";
    territories[1].owner = "bot1";
    territories[2].owner = "bot2";
    territories[3].owner = "bot3";
    
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
    
    document.getElementById("playerFlag").textContent = "🎮";
    document.getElementById("playerNameDisplay").textContent = "YOU (SOLO)";
    
    renderMap();
    updateResources();
    addLog("SOLO MODE - BOTS ARE ACTIVE", "green");
    
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameTick, 950);
}

// ====================== NAV ======================
function showCreateRoom() {
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("createScreen").style.display = "flex";
    document.getElementById("joinScreen").style.display = "none";
}

function showJoinRoom() {
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("joinScreen").style.display = "flex";
    document.getElementById("createScreen").style.display = "none";
}

function backToMenu() {
    if (roomId && firebaseListener) {
        db.ref("rooms/" + roomId).off();
    }
    if (gameInterval) clearInterval(gameInterval);
    
    document.getElementById("mainMenu").style.display = "flex";
    document.getElementById("createScreen").style.display = "none";
    document.getElementById("joinScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "none";
    roomId = null;
}

function endGame() {
    if (confirm("Return to menu?")) {
        backToMenu();
    }
}
