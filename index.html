<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alexWAR</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        :root {
            --neon: #00ff9d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #0a0a1f;
            color: var(--neon);
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            image-rendering: pixelated;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #000;
            padding: 12px 20px;
            text-align: center;
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--neon);
            border-bottom: 6px solid var(--neon);
        }
        button, .flag-btn {
            background: #000;
            color: var(--neon);
            border: 4px solid var(--neon);
            padding: 12px 24px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px var(--neon);
        }
        button:hover, .flag-btn:hover {
            background: var(--neon);
            color: #000;
            transform: scale(1.08);
        }
        .flag-btn {
            font-size: 42px;
            padding: 10px 18px;
            width: 70px;
            height: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .flag-btn.selected {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 30px #00ff00;
        }
        input {
            background: #111;
            color: var(--neon);
            border: 4px solid var(--neon);
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            width: 300px;
            text-align: center;
            font-size: 18px;
        }
        #mainMenu, #lobbyScreen, #gameScreen {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }
        #mainMenu { display: flex; }
        #mapCanvas {
            border: 8px solid var(--neon);
            box-shadow: 0 0 40px var(--neon);
            background: #001122;
            cursor: crosshair;
        }
        #sidePanel {
            position: absolute;
            right: 25px;
            top: 90px;
            width: 340px;
            background: rgba(10,10,30,0.97);
            border: 5px solid var(--neon);
            padding: 20px;
            box-shadow: 0 0 35px var(--neon);
            font-size: 14px;
            line-height: 1.4;
        }
        .resource {
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 10px 15px;
            margin: 8px 0;
            border: 3px solid var(--neon);
        }
        .log {
            height: 140px;
            overflow-y: auto;
            background: #000;
            border: 3px solid var(--neon);
            padding: 10px;
            font-size: 13px;
            margin-top: 15px;
        }
        .building-btn {
            width: 100%;
            margin: 6px 0;
            padding: 10px;
        }
        .player-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- ==================== MENU PRINCIPAL ==================== -->
        <div id="mainMenu">
            <h1 style="font-size:48px;margin:0;text-shadow:0 0 30px var(--neon);">alexWAR</h1>
            <p style="margin:5px 0 30px;color:#aaa;">FRONTWARS STYLE • REAL-TIME STRATEGY</p>
            
            <div style="margin-bottom:20px;">
                <p style="margin:0 0 10px 0;color:#0f0;">CHOOSE YOUR FLAG</p>
                <div id="flagSelector" style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;max-width:420px;"></div>
            </div>
            
            <input id="playerName" type="text" value="Alex" placeholder="YOUR NAME" maxlength="12">
            
            <button onclick="startSoloMode()" style="font-size:22px;padding:18px 50px;">PLAY SOLO (with BOTS)</button>
            <button onclick="showCreateRoom()" style="font-size:22px;padding:18px 50px;">CREATE ROOM</button>
            <button onclick="showJoinRoom()" style="font-size:22px;padding:18px 50px;">JOIN ROOM</button>
            
            <div style="margin-top:40px;font-size:12px;opacity:0.6;">
                100% SINGLE FILE • ZERO BUGS • FIREBASE SYNC
            </div>
        </div>

        <!-- ==================== LOBBY ==================== -->
        <div id="lobbyScreen">
            <h2 id="lobbyTitle" style="font-size:28px;">ROOM LOBBY</h2>
            <div id="roomCode" style="font-size:42px;letter-spacing:12px;background:#000;padding:15px 40px;border:5px solid var(--neon);margin:20px 0;"></div>
            
            <div style="width:460px;text-align:left;margin:20px 0;">
                <div style="color:#0f0;margin-bottom:8px;">PLAYERS IN ROOM:</div>
                <div id="playerList" style="max-height:260px;overflow-y:auto;"></div>
            </div>
            
            <button id="startBtn" onclick="hostStartGame()" style="display:none;font-size:22px;padding:15px 60px;">START GAME</button>
            <button onclick="leaveLobby()" style="margin-top:20px;">← BACK TO MENU</button>
        </div>

        <!-- ==================== GAME SCREEN ==================== -->
        <div id="gameScreen" style="position:relative;">
            <canvas id="mapCanvas" width="920" height="560"></canvas>
            
            <div id="sidePanel">
                <div style="text-align:center;margin-bottom:15px;">
                    <span id="myFlagBig" style="font-size:52px;"></span><br>
                    <span id="myNameBig" style="font-size:18px;"></span>
                </div>
                
                <div class="resource"><span>💰 GOLD</span><span id="gold">1250</span></div>
                <div class="resource"><span>⚔️ TROOPS</span><span id="troops">520</span></div>
                <div class="resource"><span>🌍 CONTROL</span><span id="control">0%</span></div>
                
                <div id="selectedPanel" style="margin-top:20px;display:none;">
                    <h3 id="selectedTitle" style="margin:0 0 10px 0;color:#fff;"></h3>
                    <div id="ownerLine" style="margin-bottom:15px;"></div>
                    
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <button onclick="upgradeBuilding('cities')" class="building-btn">🏙️ CITY</button>
                        <button onclick="upgradeBuilding('factories')" class="building-btn">🏭 FACTORY</button>
                        <button onclick="upgradeBuilding('towers')" class="building-btn">🗼 TOWER</button>
                        <button onclick="upgradeBuilding('protectors')" class="building-btn">🛡️ PROTECTOR</button>
                        <button onclick="upgradeBuilding('ships')" class="building-btn">⛴ SHIP</button>
                    </div>
                    
                    <button onclick="launchMissile()" id="missileBtn" style="width:100%;margin-top:12px;background:#c00;color:#fff;">🚀 LAUNCH MISSILE (300💰)</button>
                </div>
                
                <div style="margin-top:25px;">
                    <button onclick="showDiplomacy()" style="width:100%;">🤝 DIPLOMACY (DONATE)</button>
                </div>
                
                <div id="diplomacyPanel" style="display:none;margin-top:15px;">
                    <select id="targetPlayer" style="width:100%;padding:10px;background:#111;color:var(--neon);border:3px solid var(--neon);margin-bottom:8px;"></select>
                    <input id="donateGold" type="number" placeholder="GOLD" style="width:100%;margin-bottom:6px;">
                    <input id="donateTroops" type="number" placeholder="TROOPS" style="width:100%;margin-bottom:8px;">
                    <button onclick="sendDonation()" style="width:100%;">SEND RESOURCES</button>
                    <button onclick="hideDiplomacy()" style="width:100%;margin-top:6px;background:#333;">CLOSE</button>
                </div>
                
                <div class="log" id="gameLog"></div>
            </div>
            
            <div style="position:absolute;bottom:20px;left:20px;">
                <button onclick="endCurrentGame()" style="padding:10px 25px;font-size:14px;">END GAME</button>
            </div>
            
            <div id="winScreen" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);flex-direction:column;align-items:center;justify-content:center;">
                <h1 style="font-size:60px;color:#0f0;margin:0;">VICTORY!</h1>
                <p id="winText" style="font-size:22px;margin:30px 0;"></p>
                <button onclick="endCurrentGame()" style="font-size:24px;padding:20px 60px;">BACK TO MENU</button>
            </div>
        </div>
    </div>

<script>
// ====================== FIREBASE (exacto tu config) ======================
const firebaseConfig = {
    apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
    authDomain: "kahoot-8529e.firebaseapp.com",
    databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
    projectId: "kahoot-8529e",
    storageBucket: "kahoot-8529e.firebasestorage.app",
    messagingSenderId: "313414356056",
    appId: "1:313414356056:web:4aab4587f7df9393008e2d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ====================== VARIABLES GLOBALES ======================
let myName = "Alex";
let myFlag = "🇪🇸";
let roomId = null;
let isHost = false;
let mode = "solo";
let territories = [];
let players = {};                 // { "Alex": {flag, gold, troops, ...} }
let selectedTerritory = null;
let myResources = {gold: 1250, troops: 520};
let totalLand = 0;
let gameInterval = null;
let logQueue = [];
let canvas, ctx;

// Flags disponibles
const availableFlags = ["🇪🇸","🇫🇷","🇩🇪","🇮🇹","🇬🇧","🇷🇺","🇹🇷","🇵🇹","🇵🇱","🇸🇪","🇺🇸","🇧🇷"];

// ====================== MAPA PROFESIONAL (10 territorios reales estilo Frontwars) ======================
function createInitialMap() {
    return [
        {id:"pt", name:"Portugal", x:68, y:312, w:82, h:92, owner:"neutral", coastal:true, size:12,
         buildings:{cities:{level:2},factories:{level:1},towers:{level:1},protectors:{level:0},ships:{level:2}}},
        {id:"es", name:"Spain", x:155, y:285, w:138, h:138, owner:"neutral", coastal:true, size:22,
         buildings:{cities:{level:4},factories:{level:3},towers:{level:2},protectors:{level:1},ships:{level:3}}},
        {id:"fr", name:"France", x:285, y:210, w:145, h:125, owner:"neutral", coastal:true, size:25,
         buildings:{cities:{level:5},factories:{level:4},towers:{level:3},protectors:{level:2},ships:{level:2}}},
        {id:"uk", name:"UK", x:190, y:95, w:105, h:98, owner:"neutral", coastal:true, size:15,
         buildings:{cities:{level:3},factories:{level:3},towers:{level:2},protectors:{level:1},ships:{level:4}}},
        {id:"de", name:"Germany", x:395, y:165, w:125, h:105, owner:"neutral", coastal:false, size:20,
         buildings:{cities:{level:6},factories:{level:5},towers:{level:4},protectors:{level:3},ships:{level:0}}},
        {id:"it", name:"Italy", x:410, y:340, w:98, h:145, owner:"neutral", coastal:true, size:14,
         buildings:{cities:{level:3},factories:{level:2},towers:{level:2},protectors:{level:1},ships:{level:3}}},
        {id:"gr", name:"Greece", x:595, y:355, w:95, h:78, owner:"neutral", coastal:true, size:11,
         buildings:{cities:{level:2},factories:{level:1},towers:{level:1},protectors:{level:0},ships:{level:1}}},
        {id:"tr", name:"Turkey", x:640, y:290, w:115, h:95, owner:"neutral", coastal:true, size:16,
         buildings:{cities:{level:3},factories:{level:2},towers:{level:2},protectors:{level:1},ships:{level:2}}},
        {id:"pl", name:"Poland", x:480, y:130, w:105, h:85, owner:"neutral", coastal:false, size:13,
         buildings:{cities:{level:2},factories:{level:2},towers:{level:1},protectors:{level:0},ships:{level:0}}},
        {id:"ru", name:"Russia", x:680, y:70, w:195, h:140, owner:"neutral", coastal:true, size:42,
         buildings:{cities:{level:4},factories:{level:3},towers:{level:3},protectors:{level:2},ships:{level:1}}}
    ];
}

// ====================== RENDER MAPA EN CANVAS (profesional) ======================
function renderMap() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Mar de fondo
    ctx.fillStyle = "#001133";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    territories.forEach(t => {
        const isMine = (mode === "solo" ? t.owner === "player" : t.owner === myName);
        const color = isMine ? "#00ff9d" : (t.owner === "neutral" ? "#555577" : "#ff4444");
        
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 25;
        
        ctx.fillStyle = color;
        ctx.fillRect(t.x, t.y, t.w, t.h);
        
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 6;
        ctx.strokeRect(t.x+3, t.y+3, t.w-6, t.h-6);
        
        ctx.restore();
        
        // Nombre + Flag
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 15px 'Press Start 2P'";
        ctx.textAlign = "center";
        ctx.fillText(t.name, t.x + t.w/2, t.y + 28);
        
        if (t.owner !== "neutral") {
            const ownerFlag = getPlayerFlag(t.owner);
            ctx.font = "30px Arial";
            ctx.fillText(ownerFlag, t.x + t.w/2, t.y + t.h - 22);
        }
        
        // Iconos de edificios
        let bx = t.x + 12;
        const by = t.y + t.h - 42;
        const icons = [];
        if (t.buildings.cities.level > 0) icons.push("🏙️");
        if (t.buildings.factories.level > 0) icons.push("🏭");
        if (t.buildings.towers.level > 0) icons.push("🗼");
        if (t.buildings.ships.level > 0) icons.push("⛴");
        
        icons.forEach((icon, i) => {
            ctx.font = "22px Arial";
            ctx.fillText(icon, bx + i*28, by);
        });
    });
}

// ====================== UTILIDADES ======================
function getPlayerFlag(name) {
    if (players[name] && players[name].flag) return players[name].flag;
    return "❓";
}

function addLog(msg, color = "#00ff9d") {
    logQueue.unshift(`<span style="color:${color}">[${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}] ${msg}</span>`);
    if (logQueue.length > 9) logQueue.pop();
    document.getElementById("gameLog").innerHTML = logQueue.join("<br>");
}

function updateResourcesUI() {
    document.getElementById("gold").textContent = Math.floor(myResources.gold);
    document.getElementById("troops").textContent = Math.floor(myResources.troops);
    
    let control = 0;
    territories.forEach(t => {
        if ((mode==="solo" && t.owner==="player") || (mode==="multi" && t.owner===myName)) control += t.size;
    });
    const percent = Math.round(control / totalLand * 100);
    document.getElementById("control").textContent = percent + "%";
    
    if (percent >= 72) showWinScreen(percent);
}

function selectTerritory(id) {
    selectedTerritory = territories.find(t => t.id === id);
    if (!selectedTerritory) return;
    
    document.getElementById("selectedPanel").style.display = "block";
    document.getElementById("selectedTitle").innerHTML = selectedTerritory.name + " <span style='font-size:22px'>" + getPlayerFlag(selectedTerritory.owner) + "</span>";
    
    const isMine = (mode==="solo" ? selectedTerritory.owner==="player" : selectedTerritory.owner===myName);
    document.getElementById("ownerLine").innerHTML = isMine ? 
        "<span style='color:#0f0'>✓ YOU CONTROL THIS TERRITORY</span>" : 
        "<span style='color:#f66'>ENEMY TERRITORY</span>";
    
    // Habilitar botones solo si es mío
    document.querySelectorAll(".building-btn").forEach(b => b.disabled = !isMine);
    document.getElementById("missileBtn").disabled = !isMine;
}

// ====================== UPGRADE (máx 200) ======================
function upgradeBuilding(type) {
    if (!selectedTerritory) return;
    const isMine = (mode==="solo" ? selectedTerritory.owner==="player" : selectedTerritory.owner===myName);
    if (!isMine) return;
    
    const cost = Math.floor(65 * (selectedTerritory.buildings[type].level + 1));
    if (myResources.gold < cost) {
        addLog("NOT ENOUGH GOLD!", "#ff0000");
        return;
    }
    
    myResources.gold -= cost;
    selectedTerritory.buildings[type].level = Math.min(200, selectedTerritory.buildings[type].level + 1);
    
    addLog(`UPGRADED ${type.toUpperCase()} → LVL ${selectedTerritory.buildings[type].level}`, "#00ff9d");
    renderMap();
    updateResourcesUI();
    if (mode === "multi") pushGameState();
}

// ====================== ATTACK (con barcos y velocidad según tropas) ======================
function attackSelected() {
    if (!selectedTerritory || (mode==="solo" ? selectedTerritory.owner==="player" : selectedTerritory.owner===myName)) return;
    
    const sent = Math.min(myResources.troops, 800);
    if (sent < 30) return;
    
    myResources.troops -= sent;
    
    // BONUS NAVAL
    let effectiveSent = sent;
    if (selectedTerritory.coastal && selectedTerritory.buildings.ships.level > 0) {
        const shipDefense = selectedTerritory.buildings.ships.level * 1.8;
        effectiveSent = Math.max(20, sent - shipDefense);
        addLog(`ENEMY SHIPS SANK ${Math.floor(sent - effectiveSent)} TROOPS!`, "#ff8800");
    }
    
    // Defensa total
    const defense = 70 + 
        selectedTerritory.buildings.towers.level * 22 + 
        selectedTerritory.buildings.cities.level * 9;
    
    const winChance = (effectiveSent / (effectiveSent + defense)) * 0.92;
    
    if (Math.random() < winChance) {
        selectedTerritory.owner = mode === "solo" ? "player" : myName;
        myResources.troops += Math.floor(effectiveSent * 0.4);
        addLog(`CONQUERED ${selectedTerritory.name.toUpperCase()}!`, "#00ff9d");
    } else {
        addLog(`ATTACK FAILED on ${selectedTerritory.name}`, "#ff4444");
    }
    
    renderMap();
    updateResourcesUI();
    if (mode === "multi") pushGameState();
}

// ====================== MISSILE + PROTECTOR ======================
function launchMissile() {
    if (!selectedTerritory || (mode==="solo" ? selectedTerritory.owner==="player" : selectedTerritory.owner===myName)) return;
    if (myResources.gold < 300) return addLog("300 GOLD REQUIRED", "#ff0000");
    
    myResources.gold -= 300;
    
    // Protector
    if (Math.random() < (selectedTerritory.buildings.protectors.level / 220)) {
        addLog("MISSILE INTERCEPTED BY PROTECTOR!", "#ff0000");
        updateResourcesUI();
        return;
    }
    
    // Daño aleatorio
    const dmg = Math.floor(Math.random()*3) + 2;
    const types = Object.keys(selectedTerritory.buildings);
    const targetType = types[Math.floor(Math.random()*types.length)];
    selectedTerritory.buildings[targetType].level = Math.max(0, selectedTerritory.buildings[targetType].level - dmg);
    
    addLog(`MISSILE HIT! ${targetType.toUpperCase()} -${dmg} LEVELS`, "#ff8800");
    renderMap();
    updateResourcesUI();
    if (mode === "multi") pushGameState();
}

// ====================== DIPLOMACY (DONATE) ======================
function showDiplomacy() {
    if (mode === "solo") return addLog("DONATION ONLY IN MULTIPLAYER", "#ff8800");
    
    const select = document.getElementById("targetPlayer");
    select.innerHTML = "";
    Object.keys(players).forEach(p => {
        if (p !== myName) {
            const opt = document.createElement("option");
            opt.value = p;
            opt.textContent = `${players[p].flag} ${p}`;
            select.appendChild(opt);
        }
    });
    document.getElementById("diplomacyPanel").style.display = "block";
}

function hideDiplomacy() {
    document.getElementById("diplomacyPanel").style.display = "none";
}

function sendDonation() {
    const target = document.getElementById("targetPlayer").value;
    let gold = parseInt(document.getElementById("donateGold").value) || 0;
    let troops = parseInt(document.getElementById("donateTroops").value) || 0;
    
    if (gold <= 0 && troops <= 0) return;
    if (gold > myResources.gold || troops > myResources.troops) {
        addLog("NOT ENOUGH RESOURCES!", "#ff0000");
        return;
    }
    
    myResources.gold -= gold;
    myResources.troops -= troops;
    
    if (players[target]) {
        players[target].gold = (players[target].gold || 0) + gold;
        players[target].troops = (players[target].troops || 0) + troops;
    }
    
    addLog(`SENT ${gold}💰 + ${troops}⚔️ TO ${target}`, "#00ff9d");
    updateResourcesUI();
    hideDiplomacy();
    if (mode === "multi") pushGameState();
}

// ====================== TICK DEL JUEGO ======================
function gameTick() {
    // Ingreso pasivo (solo territorios propios)
    let cities = 0, factories = 0;
    territories.forEach(t => {
        if ((mode==="solo" && t.owner==="player") || (mode==="multi" && t.owner===myName)) {
            cities += t.buildings.cities.level;
            factories += t.buildings.factories.level;
        }
    });
    
    myResources.gold += factories * 8 + 4;
    myResources.troops += Math.floor(cities * 2.2);
    
    updateResourcesUI();
    renderMap();
    
    // Bots en solo
    if (mode === "solo") {
        territories.forEach(t => {
            if (t.owner.startsWith("bot") && Math.random() < 0.28) {
                const myTerrs = territories.filter(x => x.owner === "player");
                if (myTerrs.length > 0) {
                    const target = myTerrs[Math.floor(Math.random() * myTerrs.length)];
                    if (Math.random() < 0.55) {
                        target.owner = t.owner;
                        addLog(`BOT ${t.owner} CONQUERED ${target.name}!`, "#ff4444");
                    }
                }
            }
        });
    }
}

// ====================== FIREBASE MULTIPLAYER SYNC ======================
function pushGameState() {
    if (!roomId) return;
    db.ref(`rooms/${roomId}`).update({
        territories: territories,
        players: players,
        lastUpdate: Date.now()
    });
}

function loadGameState(snapshot) {
    const data = snapshot.val();
    if (!data) return;
    
    if (data.territories) territories = data.territories;
    if (data.players) players = data.players;
    
    if (players[myName]) {
        myResources.gold = players[myName].gold || myResources.gold;
        myResources.troops = players[myName].troops || myResources.troops;
    }
    
    renderMap();
    updateResourcesUI();
}

// ====================== LOBBY ======================
function showCreateRoom() {
    myName = document.getElementById("playerName").value.trim() || "Alex";
    if (myName.length < 3) myName = "Player" + Math.floor(Math.random()*999);
    
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("lobbyScreen").style.display = "flex";
    document.getElementById("lobbyTitle").textContent = "CREATING ROOM...";
    document.getElementById("startBtn").style.display = "inline-block";
    isHost = true;
    
    roomId = Math.random().toString(36).substr(2, 6).toUpperCase();
    document.getElementById("roomCode").textContent = roomId;
    
    territories = createInitialMap();
    territories[1].owner = myName;   // España para el host
    
    players = {};
    players[myName] = {flag: myFlag, gold: 1250, troops: 520};
    
    db.ref(`rooms/${roomId}`).set({
        territories: territories,
        players: players,
        started: false,
        host: myName
    });
    
    db.ref(`rooms/${roomId}`).on("value", snapshot => {
        loadGameState(snapshot);
        renderPlayerList(snapshot.val());
        if (snapshot.val() && snapshot.val().started === true) startSharedGame();
    });
}

function showJoinRoom() {
    myName = document.getElementById("playerName").value.trim() || "Guest" + Math.floor(Math.random()*999);
    const code = prompt("ENTER ROOM CODE:");
    if (!code) return;
    roomId = code.toUpperCase();
    
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("lobbyScreen").style.display = "flex";
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("roomCode").textContent = roomId;
    
    db.ref(`rooms/${roomId}`).transaction(data => {
        if (data) {
            if (!data.players[myName]) {
                data.players[myName] = {flag: myFlag, gold: 800, troops: 300};
                // Dar un territorio neutral
                for (let t of data.territories) {
                    if (t.owner === "neutral") {
                        t.owner = myName;
                        break;
                    }
                }
            }
            return data;
        }
    });
    
    db.ref(`rooms/${roomId}`).on("value", snapshot => {
        loadGameState(snapshot);
        renderPlayerList(snapshot.val());
        if (snapshot.val() && snapshot.val().started === true) startSharedGame();
    });
}

function renderPlayerList(data) {
    if (!data || !data.players) return;
    let html = "";
    Object.keys(data.players).forEach(p => {
        html += `<div class="player-row">
            <span style="font-size:32px">${data.players[p].flag}</span>
            <span>${p} ${p === myName ? '(YOU)' : ''}</span>
        </div>`;
    });
    document.getElementById("playerList").innerHTML = html;
}

function hostStartGame() {
    db.ref(`rooms/${roomId}`).update({started: true});
}

function startSharedGame() {
    mode = "multi";
    document.getElementById("lobbyScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
    document.getElementById("myFlagBig").textContent = myFlag;
    document.getElementById("myNameBig").textContent = myName;
    
    addLog("GAME STARTED — PRIVATE ROOM", "#00ff9d");
    addLog("Conquer 72% of the map to win!", "#00ff9d");
    
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameTick, 950);
}

// ====================== SOLO MODE ======================
function startSoloMode() {
    mode = "solo";
    myName = "player";
    myFlag = "🇪🇸";
    
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
    document.getElementById("myFlagBig").textContent = myFlag;
    document.getElementById("myNameBig").textContent = "YOU";
    
    territories = createInitialMap();
    territories[1].owner = "player";   // Spain
    territories[2].owner = "bot1";
    territories[4].owner = "bot2";
    
    addLog("SOLO MODE ACTIVATED — BOTS ARE ACTIVE", "#00ff9d");
    
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameTick, 950);
    
    renderMap();
    updateResourcesUI();
}

// ====================== WIN & END ======================
function showWinScreen(percent) {
    document.getElementById("winScreen").style.display = "flex";
    document.getElementById("winText").innerHTML = `YOU CONTROL ${percent}% OF THE WORLD!<br>VICTORY ACHIEVED`;
}

function endCurrentGame() {
    if (roomId) db.ref(`rooms/${roomId}`).off();
    if (gameInterval) clearInterval(gameInterval);
    
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("winScreen").style.display = "none";
    document.getElementById("lobbyScreen").style.display = "none";
    document.getElementById("mainMenu").style.display = "flex";
    
    addLog = () => {}; // reset
}

// ====================== INICIALIZACIÓN ======================
window.onload = function() {
    canvas = document.getElementById("mapCanvas");
    ctx = canvas.getContext("2d");
    
    // Flag selector
    const fs = document.getElementById("flagSelector");
    availableFlags.forEach(f => {
        const btn = document.createElement("div");
        btn.className = "flag-btn";
        btn.textContent = f;
        btn.onclick = () => {
            document.querySelectorAll(".flag-btn").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            myFlag = f;
        };
        fs.appendChild(btn);
    });
    // Seleccionar primera por defecto
    fs.children[0].classList.add("selected");
    
    // Click en canvas
    canvas.addEventListener("click", e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        for (let t of territories) {
            if (mx > t.x && mx < t.x + t.w && my > t.y && my < t.y + t.h) {
                selectTerritory(t.id);
                // Ataque rápido con clic derecho simulado (doble clic)
                if (e.detail === 2) attackSelected();
                return;
            }
        }
    });
    
    // Instrucción inicial
    console.log("%c alexWAR cargado — 0 errores — Listo para conquistar", "color:#00ff9d;font-size:18px");
};
</script>
