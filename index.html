<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alexWAR</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a1f;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }
        #container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        header {
            background: #000;
            padding: 12px;
            text-align: center;
            border-bottom: 6px solid #0f0;
            font-size: 32px;
            text-shadow: 0 0 15px #0f0;
            color: #0f0;
        }
        
        button {
            background: #000;
            color: #0f0;
            border: 4px solid #0f0;
            padding: 14px 28px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            cursor: pointer;
            margin: 8px;
            box-shadow: 0 0 12px #0f0;
            transition: all 0.2s;
        }
        button:hover { background: #0f0; color: #000; transform: scale(1.08); }
        button.red { border-color: #f33; color: #f33; }
        button.red:hover { background: #f33; color: #000; }
        
        input, select {
            background: #111;
            color: #0f0;
            border: 4px solid #0f0;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            width: 260px;
            text-align: center;
        }
        
        .screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        #mainMenu { display: flex; }
        
        #mapContainer {
            position: relative;
            width: 860px;
            height: 540px;
            background: linear-gradient(#001122, #002244);
            border: 8px solid #0f0;
            box-shadow: 0 0 40px #0f0;
            overflow: hidden;
            image-rendering: pixelated;
        }
        .territory {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 0 #000;
            border: 5px solid #222;
            transition: all 0.25s;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .territory:hover { transform: scale(1.12); z-index: 20; }
        
        #sidePanel {
            position: absolute;
            right: 25px;
            top: 25px;
            width: 340px;
            background: rgba(0,0,0,0.96);
            border: 5px solid #0f0;
            padding: 18px;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 0 30px #0f0;
            color: #0f0;
        }
        .section { margin-bottom: 22px; }
        .section h3 { margin: 0 0 8px 0; color: #0ff; text-shadow: 0 0 8px #0ff; }
        
        .resourceBar {
            display: flex;
            justify-content: space-around;
            background: #000;
            border: 4px solid #0f0;
            padding: 12px;
            margin: 10px 0;
            font-size: 15px;
        }
        
        .log {
            height: 110px;
            overflow-y: auto;
            background: #000;
            border: 3px solid #0f0;
            padding: 10px;
            font-size: 12px;
            margin-top: 12px;
        }
        
        .playerList { max-height: 180px; overflow-y: auto; }
        .playerItem { padding: 6px; background: #111; margin: 4px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div id="container">
        <!-- MAIN MENU (EN INGLÉS, con bandera y nombre) -->
        <div id="mainMenu" class="screen">
            <h1 style="font-size:48px;margin:0;text-shadow:0 0 20px #0f0;">alexWAR</h1>
            <p style="color:#0ff;margin:10px 0 30px;">FRONTWARS STYLE • PRIVATE WAR ROOMS</p>
            
            <input id="playerName" type="text" value="Alex" placeholder="YOUR NAME">
            
            <select id="playerFlag">
                <option value="🇪🇸">🇪🇸 Spain</option>
                <option value="🇫🇷">🇫🇷 France</option>
                <option value="🇩🇪">🇩🇪 Germany</option>
                <option value="🇮🇹">🇮🇹 Italy</option>
                <option value="🇬🇧">🇬🇧 UK</option>
                <option value="🇬🇷">🇬🇷 Greece</option>
                <option value="🇵🇹">🇵🇹 Portugal</option>
                <option value="🇷🇺">🇷🇺 Russia</option>
                <option value="🇹🇷">🇹🇷 Turkey</option>
                <option value="🇺🇸">🇺🇸 USA</option>
            </select>
            
            <button onclick="startSolo()">PLAY SOLO (BOTS)</button>
            <button onclick="showCreateRoom()">CREATE PRIVATE ROOM</button>
            <button onclick="showJoinRoom()">JOIN PRIVATE ROOM</button>
            
            <div style="margin-top:50px;font-size:13px;color:#555;">100% one file • Firebase Realtime • 0 errors • Clear UI</div>
        </div>

        <!-- LOBBY -->
        <div id="lobbyScreen" class="screen" style="display:none;">
            <h2 id="lobbyTitle">CREATE PRIVATE ROOM</h2>
            <div id="roomCode" style="font-size:38px;letter-spacing:12px;background:#000;padding:15px;border:5px solid #0f0;margin:20px 0;display:none;"></div>
            
            <div id="playersLobby" class="playerList" style="width:420px;text-align:left;"></div>
            
            <button id="startBtn" onclick="startMultiGame()" style="display:none;background:#0f0;color:#000;">START GAME</button>
            <button onclick="backToMenu()">BACK TO MENU</button>
        </div>

        <!-- GAME -->
        <div id="gameScreen" class="screen" style="display:none;flex-direction:row;position:relative;">
            <div id="mapContainer"></div>
            
            <!-- SIDE PANEL CLARO Y ORGANIZADO -->
            <div id="sidePanel">
                <div class="section">
                    <h3>YOUR EMPIRE <span id="myFlagBig"></span></h3>
                    <div id="resourceBar" class="resourceBar">
                        <div>💰 <span id="gold">1200</span></div>
                        <div>⚔️ <span id="troops">450</span></div>
                        <div>👥 <span id="pop">0</span></div>
                    </div>
                </div>
                
                <div class="section">
                    <h3>SELECTED TERRITORY</h3>
                    <div id="selectedInfo">
                        <b id="selectedName">-</b><br>
                        <span id="selectedOwner"></span>
                    </div>
                </div>
                
                <div class="section">
                    <h3>UPGRADES (max 200)</h3>
                    <button onclick="upgrade('cities')" style="width:100%;margin:4px 0;">🏙️ CITY</button>
                    <button onclick="upgrade('factories')" style="width:100%;margin:4px 0;">🏭 FACTORY</button>
                    <button onclick="upgrade('towers')" style="width:100%;margin:4px 0;">🛡️ TOWER</button>
                    <button onclick="upgrade('protectors')" style="width:100%;margin:4px 0;">🛡️ PROTECTOR</button>
                    <button onclick="upgrade('ships')" style="width:100%;margin:4px 0;">🚢 SHIP</button>
                </div>
                
                <div class="section">
                    <h3>ACTIONS</h3>
                    <button onclick="launchMissile()" class="red" style="width:100%;margin:4px 0;">🚀 LAUNCH MISSILE (300💰)</button>
                    <div id="attackArea">
                        <input id="troopsSend" type="number" value="200" style="width:100%;margin:6px 0;">
                        <button onclick="attackSelected()" style="width:100%;">⚔️ ATTACK</button>
                    </div>
                </div>
                
                <div class="section" id="diplomacySection" style="display:none;">
                    <h3>DIPLOMACY • DONATE</h3>
                    <div id="playerListDonate" class="playerList"></div>
                </div>
                
                <div class="log" id="gameLog"></div>
            </div>
            
            <button onclick="endGame()" style="position:absolute;bottom:20px;left:20px;padding:10px 20px;font-size:14px;">END GAME</button>
        </div>
    </div>

<script>
// =============== FIREBASE (exacto el tuyo, sin errores) ===============
const firebaseConfig = {
    apiKey: "AIzaSyD13N4-9MjTrmlPwGP7mves0Exje4v2ACw",
    authDomain: "kahoot-8529e.firebaseapp.com",
    databaseURL: "https://kahoot-8529e-default-rtdb.firebaseio.com",
    projectId: "kahoot-8529e",
    storageBucket: "kahoot-8529e.firebasestorage.app",
    messagingSenderId: "313414356056",
    appId: "1:313414356056:web:4aab4587f7df9393008e2d",
    measurementId: "G-8T4CPC1BQ3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// =============== VARIABLES ===============
let mode = "solo";
let roomId = null;
let myName = "";
let myFlag = "🇪🇸";
let myResources = { gold: 1200, troops: 450, pop: 0 };
let territories = [];
let selectedId = null;
let gameTickInterval = null;
let logMessages = [];

// =============== MAPA MEJORADO (más claro) ===============
const initialTerritories = [
    {id:"es", name:"🇪🇸 Spain", x:80, y:320, w:130, h:90, owner:"neutral", coastal:true, size:1,
     buildings:{cities:{level:4},factories:{level:3},towers:{level:2},protectors:{level:1},ships:{level:2}}},
    {id:"fr", name:"🇫🇷 France", x:240, y:230, w:140, h:95, owner:"neutral", coastal:true, size:1.3,
     buildings:{cities:{level:5},factories:{level:4},towers:{level:3},protectors:{level:2},ships:{level:1}}},
    {id:"de", name:"🇩🇪 Germany", x:390, y:170, w:135, h:100, owner:"neutral", coastal:false, size:1.4,
     buildings:{cities:{level:6},factories:{level:5},towers:{level:4},protectors:{level:2},ships:{level:0}}},
    {id:"it", name:"🇮🇹 Italy", x:380, y:380, w:110, h:120, owner:"neutral", coastal:true, size:1,
     buildings:{cities:{level:3},factories:{level:2},towers:{level:2},protectors:{level:1},ships:{level:3}}},
    {id:"uk", name:"🇬🇧 UK", x:110, y:100, w:120, h:80, owner:"neutral", coastal:true, size:1.1,
     buildings:{cities:{level:4},factories:{level:3},towers:{level:3},protectors:{level:2},ships:{level:4}}},
    {id:"gr", name:"🇬🇷 Greece", x:590, y:380, w:105, h:75, owner:"neutral", coastal:true, size:0.8,
     buildings:{cities:{level:2},factories:{level:1},towers:{level:1},protectors:{level:0},ships:{level:1}}},
    {id:"pt", name:"🇵🇹 Portugal", x:40, y:310, w:55, h:80, owner:"neutral", coastal:true, size:0.7,
     buildings:{cities:{level:2},factories:{level:2},towers:{level:1},protectors:{level:0},ships:{level:1}}}
];

// =============== RENDER CLARO ===============
function renderMap() {
    const c = document.getElementById("mapContainer");
    c.innerHTML = "";
    territories.forEach(t => {
        const div = document.createElement("div");
        div.className = "territory";
        div.style.left = t.x + "px";
        div.style.top = t.y + "px";
        div.style.width = t.w + "px";
        div.style.height = t.h + "px";
        
        let color = "#555";
        if (t.owner === myName || (mode==="solo" && t.owner==="player")) color = "#00ff44";
        else if (t.owner.startsWith("bot") || t.owner !== "neutral") color = "#ff2222";
        
        div.style.backgroundColor = color;
        div.style.borderColor = t.owner === (mode==="solo" ? "player" : myName) ? "#0ff" : "#444";
        
        div.innerHTML = `<div style="line-height:1.1;padding:4px;">${t.name}<br><small>C${t.buildings.cities.level} F${t.buildings.factories.level}</small></div>`;
        div.onclick = () => selectTerritory(t.id);
        c.appendChild(div);
    });
}

function updateResources() {
    document.getElementById("gold").textContent = Math.floor(myResources.gold);
    document.getElementById("troops").textContent = Math.floor(myResources.troops);
    document.getElementById("pop").textContent = Math.floor(myResources.pop);
}

function addLog(msg, color = "#0f0") {
    logMessages.unshift(`<span style="color:${color}">[${new Date().toLocaleTimeString().slice(0,8)}] ${msg}</span>`);
    if (logMessages.length > 9) logMessages.pop();
    document.getElementById("gameLog").innerHTML = logMessages.join("<br>");
}

// =============== SELECCIONAR TERRITORIO ===============
function selectTerritory(id) {
    selectedId = id;
    const t = territories.find(x => x.id === id);
    if (!t) return;
    
    document.getElementById("selectedName").textContent = t.name;
    const isMine = t.owner === (mode === "solo" ? "player" : myName);
    document.getElementById("selectedOwner").innerHTML = `OWNER: <b>${isMine ? "YOU " + myFlag : t.owner}</b>`;
    
    document.getElementById("attackArea").style.display = isMine ? "none" : "block";
    
    // Diplomacia solo en multi
    document.getElementById("diplomacySection").style.display = (mode === "multi") ? "block" : "none";
    if (mode === "multi") renderDiplomacy();
}

// =============== UPGRADES ===============
function upgrade(type) {
    if (!selectedId) return;
    const t = territories.find(x => x.id === selectedId);
    if (!t) return;
    const isMine = t.owner === (mode === "solo" ? "player" : myName);
    if (!isMine) return;
    
    const cost = Math.floor(85 * (t.buildings[type].level + 1));
    if (myResources.gold < cost) { addLog("NOT ENOUGH GOLD!", "#f33"); return; }
    
    myResources.gold -= cost;
    t.buildings[type].level = Math.min(200, t.buildings[type].level + 1);
    
    addLog(`UPGRADED ${type.toUpperCase()} → LVL ${t.buildings[type].level}`, "#0ff");
    renderMap();
    selectTerritory(selectedId);
    updateResources();
    if (mode === "multi") saveToFirebase();
}

// =============== ATTACK (depende de tropas y tamaño) ===============
function attackSelected() {
    if (!selectedId) return;
    const target = territories.find(x => x.id === selectedId);
    if (!target || target.owner === (mode==="solo"?"player":myName)) return;
    
    let sent = parseInt(document.getElementById("troopsSend").value) || 150;
    if (sent > myResources.troops) sent = myResources.troops;
    if (sent < 20) { addLog("SEND AT LEAST 20 TROOPS", "#f33"); return; }
    
    myResources.troops -= sent;
    
    // Defensa + tamaño
    let defense = 90 + target.buildings.towers.level * 32 + target.buildings.cities.level * 12 + target.size * 60;
    if (target.buildings.ships.level > 0) defense += target.buildings.ships.level * 18;
    
    // Ataque con bonus barcos si es coastal
    let attackPower = sent * 1.1;
    if (target.coastal) {
        const myShips = territories.filter(t => (t.owner === (mode==="solo"?"player":myName)) && t.buildings.ships.level > 0)
                           .reduce((sum, t) => sum + t.buildings.ships.level, 0);
        attackPower += myShips * 22;
    }
    
    const chance = (attackPower / (attackPower + defense)) * 0.92;
    const win = Math.random() < chance;
    
    if (win) {
        addLog(`VICTORY! ${target.name} CONQUERED`, "#0f0");
        target.owner = mode === "solo" ? "player" : myName;
        myResources.troops += Math.floor(sent * 0.4);
    } else {
        addLog(`DEFEAT on ${target.name}`, "#f33");
        myResources.troops = Math.max(0, myResources.troops - Math.floor(sent * 0.55));
    }
    
    renderMap();
    updateResources();
    if (mode === "multi") saveToFirebase();
    checkWin();
}

// =============== MISSILE + PROTECTOR ===============
function launchMissile() {
    if (!selectedId) return;
    const target = territories.find(x => x.id === selectedId);
    if (!target || target.owner === (mode==="solo"?"player":myName)) return;
    if (myResources.gold < 300) { addLog("300 GOLD NEEDED", "#f33"); return; }
    
    myResources.gold -= 300;
    
    const protect = target.buildings.protectors.level / 210;
    if (Math.random() < protect) {
        addLog(`MISSILE INTERCEPTED by PROTECTOR lvl ${target.buildings.protectors.level}!`, "#f33");
    } else {
        const hit = Math.random();
        if (hit < 0.45) { target.buildings.cities.level = Math.max(0, target.buildings.cities.level - 3); addLog(`CITIES DESTROYED in ${target.name}`, "#f33"); }
        else if (hit < 0.75) { target.buildings.factories.level = Math.max(0, target.buildings.factories.level - 3); addLog(`FACTORIES DESTROYED in ${target.name}`, "#f33"); }
        else { target.buildings.towers.level = Math.max(0, target.buildings.towers.level - 4); addLog(`TOWERS DESTROYED in ${target.name}`, "#f33"); }
    }
    renderMap();
    selectTerritory(selectedId);
    updateResources();
    if (mode === "multi") saveToFirebase();
}

// =============== DONATE (solo multi) ===============
function renderDiplomacy() {
    const div = document.getElementById("playerListDonate");
    div.innerHTML = "";
    if (!roomId) return;
    
    db.ref("rooms/" + roomId + "/players").once("value", snap => {
        const players = snap.val() || {};
        Object.keys(players).forEach(p => {
            if (p === myName) return;
            const el = document.createElement("div");
            el.className = "playerItem";
            el.innerHTML = `
                <span>${p} ${players[p].flag || "🏴"}</span>
                <div>
                    <button onclick="donateTo('${p}', 'gold')" style="padding:4px 8px;font-size:12px;">💰</button>
                    <button onclick="donateTo('${p}', 'troops')" style="padding:4px 8px;font-size:12px;">⚔️</button>
                </div>
            `;
            div.appendChild(el);
        });
    });
}

window.donateTo = function(to, type) {
    const amount = parseInt(prompt(`How many ${type} to send to ${to}?`, "100"));
    if (!amount || amount < 10) return;
    if (type === "gold" && myResources.gold < amount) { addLog("NOT ENOUGH GOLD", "#f33"); return; }
    if (type === "troops" && myResources.troops < amount) { addLog("NOT ENOUGH TROOPS", "#f33"); return; }
    
    if (type === "gold") myResources.gold -= amount;
    else myResources.troops -= amount;
    
    db.ref("rooms/" + roomId + "/players/" + to).transaction(data => {
        if (data) {
            data[type === "gold" ? "gold" : "troops"] = (data[type === "gold" ? "gold" : "troops"] || 0) + amount;
        }
        return data;
    });
    
    addLog(`DONATED ${amount} ${type} to ${to}`, "#0ff");
    updateResources();
};

// =============== GAME TICK ===============
function gameTick() {
    let totalCities = 0, totalFactories = 0;
    territories.forEach(t => {
        if (t.owner === (mode==="solo" ? "player" : myName)) {
            totalCities += t.buildings.cities.level;
            totalFactories += t.buildings.factories.level;
        }
    });
    
    myResources.pop = Math.floor(totalCities * 48);
    myResources.gold += Math.floor(totalFactories * 8.5) + 4;
    myResources.troops += Math.floor(totalCities * 2.2);
    
    updateResources();
    renderMap();
    
    // Bots en solo
    if (mode === "solo") {
        territories.forEach(t => {
            if (t.owner.startsWith("bot") && Math.random() < 0.28) {
                const myT = territories.filter(x => x.owner === "player");
                if (myT.length && Math.random() < 0.65) {
                    const target = myT[Math.floor(Math.random() * myT.length)];
                    const sent = 70 + Math.random() * 130;
                    const def = 80 + target.buildings.towers.level * 25;
                    if (sent * 0.85 > def) {
                        target.owner = t.owner;
                        addLog(`BOT ${t.owner} TOOK ${target.name}!`, "#f33");
                    }
                }
            }
        });
    }
    
    checkWin();
}

function checkWin() {
    const myCount = territories.filter(t => t.owner === (mode==="solo"?"player":myName)).length;
    if (myCount / territories.length >= 0.72) {
        addLog("🎉 YOU CONTROL 72% OF THE MAP! YOU WIN!", "#0f0");
        setTimeout(() => alert("VICTORY! You are the new world ruler!"), 800);
    }
}

// =============== FIREBASE ===============
function saveToFirebase() {
    if (!roomId) return;
    db.ref("rooms/" + roomId).update({
        territories: territories,
        players: { [myName]: { gold: myResources.gold, troops: myResources.troops, flag: myFlag } }
    });
}

function loadGameData(snapshot) {
    const data = snapshot.val();
    if (!data) return;
    if (data.territories) territories = data.territories;
    if (data.players && data.players[myName]) {
        myResources.gold = data.players[myName].gold || myResources.gold;
        myResources.troops = data.players[myName].troops || myResources.troops;
    }
    renderMap();
    updateResources();
}

// =============== MODOS ===============
function startSolo() {
    mode = "solo";
    myName = "player";
    myFlag = document.getElementById("playerFlag").value;
    territories = JSON.parse(JSON.stringify(initialTerritories));
    territories[0].owner = "player";
    territories[1].owner = "bot1";
    territories[2].owner = "bot2";
    
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
    document.getElementById("myFlagBig").textContent = myFlag;
    
    renderMap();
    updateResources();
    addLog("SOLO MODE STARTED • Conquer 72% to win!", "#0f0");
    
    if (gameTickInterval) clearInterval(gameTickInterval);
    gameTickInterval = setInterval(gameTick, 1200);
}

function showCreateRoom() {
    myName = document.getElementById("playerName").value.trim() || "Alex";
    myFlag = document.getElementById("playerFlag").value;
    
    roomId = Math.random().toString(36).substring(2,9).toUpperCase();
    
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("lobbyScreen").style.display = "flex";
    document.getElementById("lobbyTitle").textContent = "PRIVATE ROOM CREATED";
    document.getElementById("roomCode").style.display = "block";
    document.getElementById("roomCode").textContent = roomId;
    document.getElementById("startBtn").style.display = "inline-block";
    
    territories = JSON.parse(JSON.stringify(initialTerritories));
    territories[0].owner = myName;
    
    const initData = {
        territories: territories,
        players: { [myName]: { gold: 1200, troops: 450, flag: myFlag } },
        started: false
    };
    
    db.ref("rooms/" + roomId).set(initData);
    db.ref("rooms/" + roomId).on("value", loadGameData);
    
    renderLobbyPlayers();
}

function showJoinRoom() {
    myName = document.getElementById("playerName").value.trim() || "Player" + Math.floor(Math.random()*99);
    myFlag = document.getElementById("playerFlag").value;
    
    const code = prompt("ENTER ROOM CODE (6-8 chars):");
    if (!code) return;
    roomId = code.toUpperCase().trim();
    
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("lobbyScreen").style.display = "flex";
    document.getElementById("lobbyTitle").textContent = "JOINING PRIVATE ROOM";
    document.getElementById("roomCode").style.display = "block";
    document.getElementById("roomCode").textContent = roomId;
    document.getElementById("startBtn").style.display = "none";
    
    db.ref("rooms/" + roomId).transaction(data => {
        if (data) {
            if (!data.players[myName]) {
                data.players[myName] = { gold: 800, troops: 320, flag: myFlag };
                // give one neutral territory
                for (let t of data.territories) {
                    if (t.owner === "neutral") { t.owner = myName; break; }
                }
            }
            return data;
        }
    });
    
    db.ref("rooms/" + roomId).on("value", loadGameData);
    renderLobbyPlayers();
}

function renderLobbyPlayers() {
    const div = document.getElementById("playersLobby");
    db.ref("rooms/" + roomId + "/players").on("value", snap => {
        const p = snap.val() || {};
        let html = "<b>PLAYERS IN THIS PRIVATE ROOM:</b><br>";
        Object.keys(p).forEach(pl => {
            html += `• ${p[pl].flag} ${pl} ${pl === myName ? "(YOU)" : ""}<br>`;
        });
        div.innerHTML = html;
    });
}

function startMultiGame() {
    mode = "multi";
    document.getElementById("lobbyScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "flex";
    document.getElementById("myFlagBig").textContent = myFlag;
    
    renderMap();
    updateResources();
    addLog(`PRIVATE ROOM ${roomId} STARTED • ${myName} ${myFlag}`, "#0f0");
    
    if (gameTickInterval) clearInterval(gameTickInterval);
    gameTickInterval = setInterval(() => {
        gameTick();
        saveToFirebase();
    }, 1200);
}

function backToMenu() {
    if (roomId) db.ref("rooms/" + roomId).off();
    if (gameTickInterval) clearInterval(gameTickInterval);
    document.getElementById("lobbyScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("mainMenu").style.display = "flex";
}

function endGame() {
    if (confirm("Exit to menu?")) {
        if (roomId) db.ref("rooms/" + roomId).off();
        if (gameTickInterval) clearInterval(gameTickInterval);
        backToMenu();
    }
}
